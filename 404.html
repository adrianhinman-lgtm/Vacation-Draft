<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vacation Draft — Redirecting…</title>
<script>
  // GitHub Pages 404 redirect trick for query string URLs
  // Preserve the full URL including ?token= and redirect to index.html
  var url = window.location.href;
  var origin = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
  var search = window.location.search;
  // Redirect to the root with the query string intact
  window.location.replace(origin + 'index.html' + search);
</script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#666">
    Redirecting to Vacation Draft…
  </p>
</body>
</html>
